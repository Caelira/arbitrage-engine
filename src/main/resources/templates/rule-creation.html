<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbitrage Engine | Rule Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

<aside class="w-64 bg-gray-900 text-white flex flex-col shadow-xl hidden md:flex">
  <div class="h-16 flex items-center px-6 border-b border-gray-800">
    <h1 class="text-xl font-bold tracking-wider text-emerald-400">ARBITRAGE<span class="text-white">.SYS</span></h1>
  </div>
  <nav class="flex-1 px-4 py-6 space-y-2">
    <a th:href="@{/deals}" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
      <span class="font-medium">Live Deals</span>
    </a>
    <a href="/createARule" class="flex items-center px-4 py-3 bg-emerald-600 text-white rounded-lg transition-colors">
      <span class="font-medium">Rule Builder</span>
    </a>
    <a href="#" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
      <span class="font-medium">System Logs</span>
    </a>
  </nav>
</aside>

<div class="flex-1 flex flex-col h-screen">

  <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
    <h2 class="text-xl font-semibold text-gray-700">Scraper Configuration</h2>
    <div class="flex items-center space-x-3">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
      <span class="text-sm font-medium text-gray-600">Engine Status: <span class="text-emerald-600">Active</span></span>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-8">

    <div class="max-w-5xl mx-auto space-y-8">

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
          <h3 class="text-lg font-semibold text-gray-800">Define Target Parameters</h3>
          <p class="text-sm text-gray-500 mt-1">Configure the CSS selectors to map incoming listing data.</p>
        </div>

        <div class="p-6">
          <form th:action="@{/saveRule}" method="post" th:object="${rule}" class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Platform</label>
                <input type="text" th:field="*{platform}" placeholder="e.g., eBay, Carousell" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Currency</label>
                <input type="text" th:field="*{currency}" placeholder="USD, PHP" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>
              <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Target URL</label>
                <input type="text" th:field="*{urlText}" placeholder="https://..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Universal Class (.s-item)</label>
                <input type="text" th:field="*{univClass}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Price Class (.s-item__price)</label>
                <input type="text" th:field="*{priceClass}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Title Class (.s-item__title)</label>
                <input type="text" th:field="*{titleClass}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Link Class (.s-item__link)</label>
                <input type="text" th:field="*{urlClass}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
              </div>
            </div>

            <div class="flex justify-end pt-4">
              <button type="submit" class="px-6 py-2.5 bg-gray-900 text-white font-medium rounded-lg hover:bg-emerald-600 transition-colors shadow-sm">
                Deploy Rule
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
          <h3 class="text-lg font-semibold text-gray-800">Active Scraper Rules</h3>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rule ID</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Target URL</th>
              <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="savedRule : ${allRules}" class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${savedRule.id}"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 truncate max-w-md" th:text="${savedRule.urlText}"></td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <a href="#" class="text-emerald-600 hover:text-emerald-900">Edit</a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(allRules)}">
              <td colspan="3" class="px-6 py-8 text-center text-sm text-gray-500">
                No active rules deployed. Configure a target above to begin.
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>
</body>
</html>
